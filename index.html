<!DOCTYPE html>
<html>

<head>
    <title>Coca Cola</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="https://img.icons8.com/?size=100&id=114455&format=png&color=000000" type="image/png">
</head>

<!--  
    PLANNING CRAZY
    
>> Text Div (change text -> scroll)
    >>COCA-COLA
    >>Feel The Chill
    >>Scroll to cool down

    >>Frozen Freshness
    >>Every Drop Ice Cold

    >>Open Happiness
    >>Best served chilled

>> Bottle
    >> Main Div
        >> Show when scroll a little
        >> Sub div (bottle)
            >> Change bottle to cool 

>> Sub Text div
    >> Scroll Down 
        >> chnage the text when scroll complete
            >> Scroll Up

>> Ice Cube div
    >> 3 icecube from right and left

-->

<body>
    <!-- Text Div -->
    <!-- Need to divide the text into 3 parts
        >> Intro part  
        >> Ice part
        >> Outro part
        Each need different timeline for animation starting and ending time use scroll funcation.
    -->
    <div class="text-div-main">

        <!-- Set1 -->
        <div class="text-div-main-set text-set1">
            <p class="text-up-p">COCA COLA</p>
            <h1 class="text-mid-h1">FEEL THE CHILL</h1>
            <p class="text-dw-p">Crafted for refreshment</p>
        </div>

        <!-- Set2 -->
        <div class="text-div-main-set text-set2">
            <p class="text-up-p">FROZEN FRESHNESS</p>
            <h class="text-mid-h1">ICE IN EVERY DROPS</h>
            <p class="text-dw-p">Pure cooling experince</p>
        </div>

        <!-- Set3  -->
        <div class="text-div-main-set text-set3">
            <p class="text-up-p">OPEN HAPPINESS</p>
            <h1 class="text-mid-h1">BESST SERVED CHILLED</h1>
            <p class="text-dw-p">Taste the cold</p>
        </div>
    </div>

    <!-- Coca Cola -->
    <div class="coca-cola-main">
        <img src="images/coca-cola-warm.jpg" alt="">
    </div>
</body>

</html>
